<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="16" fill="url(#bg)"/>
  <rect x="20" y="20" width="360" height="260" rx="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Package icon -->
  <g transform="translate(200,130)" opacity="0.3">
    <rect x="-35" y="-25" width="70" height="50" rx="6" fill="url(#icon)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-15" y1="10" x2="15" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Sparkle dots -->
  <circle cx="60" cy="70" r="2" fill="rgba(255,255,255,0.08)"/>
  <circle cx="340" cy="80" r="1.5" fill="rgba(255,255,255,0.06)"/>
  <circle cx="80" cy="230" r="1.5" fill="rgba(255,255,255,0.06)"/>
  <circle cx="320" cy="220" r="2" fill="rgba(255,255,255,0.08)"/>
</svg>
